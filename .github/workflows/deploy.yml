name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

env:
  NODE_VERSION: 24 # Specify Node.js version

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: 'vpleo-shop' # Your Cloudflare Pages project name
          directory: 'out' # The directory where your build output is located
          # Optional: If you have a custom build command, uncomment and set it here
          # buildCommand: 'npm run build'
          # Optional: If you want to deploy to a specific branch, uncomment and set it here
          # branch: 'main'
